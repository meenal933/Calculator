<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top right,#b91cff,#1b1464 60%);
}

.calculator{
width:520px;
padding:50px;
border-radius:30px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 0 60px rgba(140,0,255,0.4);
text-align:center;
color:white;
}

h1{
font-size:38px;
margin-bottom:35px;
font-weight:600;
letter-spacing:1px;
}

input{
width:100%;
padding:15px;
margin:15px 0;
border-radius:12px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.1);
color:white;
font-size:18px;
outline:none;
}

input::placeholder{
color:rgba(255,255,255,0.7);
}

.buttons{
margin-top:25px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

button{
padding:15px;
border-radius:12px;
border:none;
font-size:18px;
font-weight:500;
cursor:pointer;
color:white;
background:linear-gradient(45deg,#00c6ff,#0072ff);
transition:0.3s ease;
box-shadow:0 0 20px rgba(0,114,255,0.5);
}

button:hover{
transform:translateY(-3px);
box-shadow:0 0 30px rgba(0,114,255,0.9);
}

#result{
margin-top:35px;
font-size:22px;
opacity:0.9;
}
</style>

<script>

async function calculate(operation){

let x=document.getElementById("x").value;
let b=document.getElementById("b").value;

if(x===""){
alert("Enter value X");
return;
}

let url=`http://localhost:8000/${operation}/${x}`;

if(operation==="power"){
if(b===""){
alert("Enter value B");
return;
}
url=`http://localhost:8000/power/${x}/${b}`;
}

try{

let response=await fetch(url);

if(!response.ok){
throw new Error("API error");
}

let data=await response.json();

document.getElementById("result").innerText="Result: "+data.result;

}
catch(error){

document.getElementById("result").innerText="Error connecting to API";
console.log(error);

}

}

</script>

</head>

<body>

<div class="calculator">

<h1>Scientific Calculator</h1>

<input type="number" id="x" placeholder="Enter value X">
<input type="number" id="b" placeholder="Power value B (for x^b)">

<div class="buttons">

<button onclick="calculate('sqrt')">Square Root</button>
<button onclick="calculate('factorial')">Factorial</button>
<button onclick="calculate('ln')">Natural Log</button>
<button onclick="calculate('power')">Power</button>

</div>

<div id="result">Result:</div>

</div>

</body>
</html>
